<!DOCTYPE html>
<html>
	<head>
      <style>
         @keyframes move {
            0% {transform: rotateY(0deg)};
            25% {transform: rotateY(180deg)};
            50% {transform: rotateY(360deg)};
            75% {transform: rotateY(-180deg)};
            100% {transform: rotateY(-1deg)};
         }

         h1 {
            position: relative;
            animation: move 5s infinite;
         }
      </style>
